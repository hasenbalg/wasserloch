<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Garden Watering System</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <header>
        <div class="header-content">
            <h1>Garden Watering System</h1>
            <nav>
                <a href="/" class="active">Schedule</a>
                <a href="/wifi">WiFi Settings</a>
            </nav>
            <div class="status-bar">
                <span id="connection-status" class="status-connected">● Connected</span>
                <span id="current-time"></span>
            </div>
        </div>
    </header>

    <main>
        <!-- Valve Control Panel -->
        <section class="valve-control">
            <h2>Valve Control</h2>
            <div class="valves-container">
                <div class="valve-card" data-valve="0">
                    <div class="valve-indicator closed"></div>
                    <h3>Valve 1</h3>
                    <p>Zone A - Front Garden</p>
                    <div class="valve-actions">
                        <button onclick="openValve(0)" class="btn-open">Open</button>
                        <button onclick="closeValve(0)" class="btn-close">Close</button>
                    </div>
                    <div class="duration-selector">
                        <label>Duration (min):</label>
                        <input type="number" id="duration-0" value="15" min="1" max="120">
                    </div>
                </div>
                <div class="valve-card" data-valve="1">
                    <div class="valve-indicator closed"></div>
                    <h3>Valve 2</h3>
                    <p>Zone B - Back Garden</p>
                    <div class="valve-actions">
                        <button onclick="openValve(1)" class="btn-open">Open</button>
                        <button onclick="closeValve(1)" class="btn-close">Close</button>
                    </div>
                    <div class="duration-selector">
                        <label>Duration (min):</label>
                        <input type="number" id="duration-1" value="15" min="1" max="120">
                    </div>
                </div>
                <div class="valve-card" data-valve="2">
                    <div class="valve-indicator closed"></div>
                    <h3>Valve 3</h3>
                    <p>Zone C - Vegetable Patch</p>
                    <div class="valve-actions">
                        <button onclick="openValve(2)" class="btn-open">Open</button>
                        <button onclick="closeValve(2)" class="btn-close">Close</button>
                    </div>
                    <div class="duration-selector">
                        <label>Duration (min):</label>
                        <input type="number" id="duration-2" value="20" min="1" max="120">
                    </div>
                </div>
                <div class="valve-card" data-valve="3">
                    <div class="valve-indicator closed"></div>
                    <h3>Valve 4</h3>
                    <p>Zone D - Flower Beds</p>
                    <div class="valve-actions">
                        <button onclick="openValve(3)" class="btn-open">Open</button>
                        <button onclick="closeValve(3)" class="btn-close">Close</button>
                    </div>
                    <div class="duration-selector">
                        <label>Duration (min):</label>
                        <input type="number" id="duration-3" value="10" min="1" max="120">
                    </div>
                </div>
            </div>
            <button onclick="stopAllValves()" class="btn-emergency">⚠️ Stop All Valves</button>
        </section>

        <!-- Schedule Editor -->
        <section class="schedule-editor">
            <h2>Weekly Schedule</h2>
            <div id="schedule-container">
                <!-- Schedule cards will be generated by JavaScript -->
            </div>
            <button onclick="saveSchedule()" class="btn-save">💾 Save Schedule</button>
        </section>

        <!-- Time Sync Info -->
        <section class="time-info">
            <h2>System Information</h2>
            <div class="info-grid">
                <div class="info-item">
                    <label>System Time:</label>
                    <span id="system-time">--</span>
                </div>
                <div class="info-item">
                    <label>Browser Time:</label>
                    <span id="browser-time">--</span>
                </div>
                <div class="info-item">
                    <label>Time Difference:</label>
                    <span id="time-diff">--</span>
                </div>
                <div class="info-item">
                    <label>WiFi Mode:</label>
                    <span id="wifi-mode">--</span>
                </div>
            </div>
            <button onclick="syncTime()" class="btn-sync">🔄 Sync Time with Browser</button>
        </section>
    </main>

    <!-- Toast Notification -->
    <div id="toast" class="toast hidden"></div>

    <script src="/static/script.js"></script>
</body>
</html>
